            showPopup("Not Connected!");
          });
        } else {
          // WRONG CODE: show alert, do NOT show popup
          showAlertMessage("⛔ ACCESS DENIED · INVALID CODE");
          secretInput.value = '';
        }
      }

      // ---- Event Listeners ----
      confirmBtn.addEventListener('click', handleConfirm);
      secretInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleConfirm();
        }
      });

      // Close button inside popup (only way to close)
      closePopupBtn.addEventListener('click', hidePopup);

      // PREVENT closing when clicking outside popup (overlay click disabled intentionally)
      popupOverlay.addEventListener('click', (e) => {
        // Do nothing if clicking overlay background – popup stays.
        // Only close if explicitly via close button.
        e.stopPropagation();
      });

      // Escape key also blocked to enforce close button only? We'll allow Escape as extra convenience,
      // but user asked only close button. To be strict, we disable Escape close.
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && popupOverlay.classList.contains('active')) {
          // Prevent default and do NOT close (only close button)
          e.preventDefault();
          // optionally show small hint
          showAlertMessage("🔒 Use the CLOSE button to exit.");
        }
      });

      // Initial page loading animation
      window.addEventListener('load', () => {
        // Keep initial loading visible at least 1.5s for effect
        setTimeout(() => {
          initialLoading.classList.add('hidden');
        }, 5000);
      });

      // Cleanup
      window.addEventListener('beforeunload', () => {
        stopPingUpdates();
      });

      // Set initial ping number
      if (pingNumberEl) pingNumberEl.textContent = getRandomPing();
    })();

      const TYPE_SPEED_MS = 22;
      const PAUSE_BETWEEN_LINES = 350;
      const MAX_VISIBLE_LINES = 10;
      
      let currentLineIndex = 0;
      let charIndex = 0;
      let currentFullText = "";
      let isTyping = false;
      let typingTimer = null;
      let glitchInterval = null;
      let packetCounter = 0;
      
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      
      function getRandomLine() {
        if (Math.random() < 0.1) {
          return hexBlobs[Math.floor(Math.random() * hexBlobs.length)];
        }
        return linesPool[Math.floor(Math.random() * linesPool.length)];
      }

      function incrementPacketCounter() {
        packetCounter += Math.floor(Math.random() * 5) + 1;
        if (counterSpan) {
          counterSpan.textContent = `PKTS: ${packetCounter}`;
        }
        if (packetCounter > 999) {
          packetCounter = Math.floor(Math.random() * 200);
        }
      }

      function appendCharacter(char) {
        if (!textElement) return;
        
        let currentContent = textElement.textContent || "";
        
        if (charIndex === 0) {
          if (currentContent.length > 0) {
            currentContent += "\n";
          }
        }
        
        currentContent += char;
        textElement.textContent = currentContent;
        
        if (consoleContainer) {
          consoleContainer.scrollTop = consoleContainer.scrollHeight;
        }
        
        const lines = currentContent.split('\n');
        if (lines.length > MAX_VISIBLE_LINES) {
          const trimmed = lines.slice(lines.length - MAX_VISIBLE_LINES).join('\n');
          textElement.textContent = trimmed;
          
          const newLines = trimmed.split('\n');
          const lastLine = newLines[newLines.length - 1] || "";
          if (lastLine.length <= currentFullText.length) {
            charIndex = lastLine.length;
          } else {
            charIndex = lastLine.length;
            currentFullText = lastLine;
          }
        }
        
        ensureCursorAttached();
      }

      function ensureCursorAttached() {
        if (!textElement) return;
        if (cursorSpan.parentNode) {
          cursorSpan.remove();
        }
        if (consoleContainer && textElement.parentNode === consoleContainer) {
          consoleContainer.appendChild(cursorSpan);
        } else {
          textElement.parentNode?.appendChild(cursorSpan);
        }
      }

      function startNewLine() {
        currentFullText = getRandomLine();
        charIndex = 0;
        isTyping = true;
        
        if (typingTimer) clearTimeout(typingTimer);
        typeNextCharacter();
      }

      function typeNextCharacter() {
        if (!isTyping) return;
        
        if (charIndex >= currentFullText.length) {
          isTyping = false;
          if (typingTimer) clearTimeout(typingTimer);
          
          incrementPacketCounter();
          
          typingTimer = setTimeout(() => {
            startNewLine();
          }, PAUSE_BETWEEN_LINES + Math.floor(Math.random() * 150));
          
          return;
        }
        
        const nextChar = currentFullText.charAt(charIndex);
        appendCharacter(nextChar);
        charIndex++;
        
        let speed = TYPE_SPEED_MS;
        if (Math.random() < 0.06) {
          speed = TYPE_SPEED_MS * 2.5 + Math.random() * 80;
        } else if (Math.random() < 0.12) {
          speed = TYPE_SPEED_MS * 0.5;
        }
        
        typingTimer = setTimeout(typeNextCharacter, speed);
      }

      function applyRandomGlitch() {
        if (!textElement) return;
        textElement.classList.add('glitch-active');
        
        const glitchDuration = Math.random() * 150 + 50;
        setTimeout(() => {
          textElement.classList.remove('glitch-active');
        }, glitchDuration);
      }

      function startGlitchEffect() {
        if (glitchInterval) clearInterval(glitchInterval);
        glitchInterval = setInterval(() => {
          if (Math.random() < 0.2) {
            applyRandomGlitch();
          }
          if (Math.random() < 0.35) {
            incrementPacketCounter();
          }
        }, 700);
      }

      function initHackingAnimation() {
        if (!textElement || !consoleContainer) return;
        
        textElement.textContent = "";
        charIndex = 0;
        currentFullText = "";
        isTyping = false;
        if (typingTimer) clearTimeout(typingTimer);
        
        ensureCursorAttached();
        startGlitchEffect();
        startNewLine();
      }

      window.addEventListener('resize', () => {
        if (consoleContainer) {
          consoleContainer.scrollTop = consoleContainer.scrollHeight;
        }
      });

      window.addEventListener('beforeunload', () => {
        if (typingTimer) clearTimeout(typingTimer);
        if (glitchInterval) clearInterval(glitchInterval);
      });

      window.addEventListener('DOMContentLoaded', initHackingAnimation);
    })();
